<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}metatranscribe{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.55; margin: 0; padding: 0;
      background: Canvas; color: CanvasText;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 0.75rem 1rem; border-bottom: 1px solid rgba(128,128,128,0.3);
    }
    header h1 { font-size: 1.1rem; margin: 0; }
    header a { color: inherit; text-decoration: none; }
    main { max-width: 760px; margin: 0 auto; padding: 1rem; }
    .btn {
      display: inline-block; padding: 0.6rem 1rem; border: none; border-radius: 8px;
      background: #2563eb; color: #fff; font-size: 1rem; cursor: pointer; text-decoration: none;
    }
    .btn.secondary { background: transparent; color: inherit; border: 1px solid rgba(128,128,128,0.5); }
    .flash { padding: 0.6rem 0.9rem; border-radius: 8px; background: rgba(234,179,8,0.18);
             border: 1px solid rgba(234,179,8,0.5); margin-bottom: 1rem; }
    .upload { border: 1px dashed rgba(128,128,128,0.5); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
    .upload input[type=file] { display: block; margin-bottom: 0.75rem; width: 100%; }
    ul.items { list-style: none; padding: 0; margin: 0; }
    ul.items li { border-bottom: 1px solid rgba(128,128,128,0.2); }
    ul.items li a { display: flex; justify-content: space-between; align-items: center;
                    gap: 0.75rem; padding: 0.85rem 0.25rem; text-decoration: none; color: inherit; }
    .meta { font-size: 0.85rem; opacity: 0.7; }
    .badge { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 999px; white-space: nowrap;
             border: 1px solid rgba(128,128,128,0.4); }
    .badge.ready { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.5); }
    .badge.failed { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.5); }
    .badge.progress { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.45); }
    .transcript h1, .transcript h2, .transcript h3 { line-height: 1.25; }
    .error { color: #b91c1c; }
    .empty { opacity: 0.6; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>
  {% if session.get('authed') %}
  <header>
    <h1><a href="{{ url_for('index') }}">metatranscribe</a></h1>
    <form method="post" action="{{ url_for('logout') }}">
      <button class="btn secondary" type="submit">Log out</button>
    </form>
  </header>
  {% endif %}
  <main>
    {% with messages = get_flashed_messages() %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
